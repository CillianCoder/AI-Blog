name: RSS Feed Check

on:
  workflow_dispatch: # allows you to run it manually from GitHub

jobs:
  rss-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run RSS check
        run: node rss-check.js
