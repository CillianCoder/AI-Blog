name: Manual Link Check
on: 
  workflow_dispatch: # This adds the "Run workflow" button in the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Upgraded to fix the "Unsupported Engine" warnings

      - name: Install Dependencies
        run: npm install axios xml2js he # New libraries for better parsing

      - name: Run Test Script
        run: node test-rss.js
