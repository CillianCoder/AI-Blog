name: Manual Link Check
on: workflow_dispatch # This adds the "Run" button

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install
        run: npm install rss-parser he
      - name: Run
        run: node test-rss.js
