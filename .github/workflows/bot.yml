name: News Bot

on:
  schedule:
    # 8 AM US Eastern
    - cron: "0 13 * * *"
    # 1 PM US Eastern
    - cron: "0 18 * * *"
    # 7 PM US Eastern
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5  # ✅ latest stable

      - name: Setup Node.js
        uses: actions/setup-node@v5  # ✅ latest stable
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run bot
        run: node bot.js
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.PAGE_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
