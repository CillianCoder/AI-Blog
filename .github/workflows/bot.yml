name: News Bot

on:
  schedule:
    # 8 AM US Eastern
    - cron: "0 13 * * *"

    # 1 PM US Eastern
    - cron: "0 18 * * *"

    # 7 PM US Eastern
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ opt-in early

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # upgrade to @v5 when available

      - name: Setup Node
        uses: actions/setup-node@v4  # upgrade to @v5 when available
        with:
          node-version: "22"   # ✅ use active LTS (better than 20)

      - name: Install dependencies
        run: npm ci   # ✅ faster + cleaner installs

      - name: Run bot
        run: node bot.js
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.PAGE_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          HF_KEY: ${{ secrets.HF_KEY }}
